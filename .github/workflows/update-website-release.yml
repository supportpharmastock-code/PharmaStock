name: Update Website After Release

on:
  release:
    types: [published]
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: update-pharmastock-website
  cancel-in-progress: false

jobs:
  update-website:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout main branch
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - name: Update website version and download URL
        env:
          EVENT_PATH: ${{ github.event_path }}
          REPOSITORY: ${{ github.repository }}
          EVENT_NAME: ${{ github.event_name }}
        run: |
          python3 <<'PY'
          import json
          import os
          import re
          import urllib.request
          from pathlib import Path

          event_path = Path(os.environ["EVENT_PATH"])
          event = json.loads(event_path.read_text(encoding="utf-8"))

          release = event.get("release")

          # Manual run: load latest published release from GitHub.
          if not release:
              api_url = f"https://api.github.com/repos/{os.environ['REPOSITORY']}/releases/latest"
              request = urllib.request.Request(
                  api_url,
                  headers={
                      "Accept": "application/vnd.github+json",
                      "User-Agent": "PharmaStock-Website-Updater"
                  },
              )
              with urllib.request.urlopen(request) as response:
                  release = json.load(response)

          tag = str(release.get("tag_name", "")).strip()
          if not tag:
              raise SystemExit("Release tag was not found.")

          version = tag[1:] if tag.lower().startswith("v") else tag

          # Prefer the actual Windows .exe uploaded to this release.
          assets = release.get("assets") or []
          exe_assets = [
              asset for asset in assets
              if str(asset.get("name", "")).lower().endswith(".exe")
          ]

          if not exe_assets:
              raise SystemExit(
                  "No .exe asset found in the published release. "
                  "Upload the installer before publishing the release."
              )

          # Prefer a PharmaStock Setup installer if multiple EXEs exist.
          installer = next(
              (
                  asset for asset in exe_assets
                  if "pharmastock" in str(asset.get("name", "")).lower()
                  and "setup" in str(asset.get("name", "")).lower()
              ),
              exe_assets[0],
          )

          download_url = str(installer.get("browser_download_url", "")).strip()
          if not download_url:
              raise SystemExit("Installer download URL was not found.")

          release_url = str(release.get("html_url", "")).strip()
          if not release_url:
              release_url = (
                  f"https://github.com/{os.environ['REPOSITORY']}/releases/tag/{tag}"
              )

          path = Path("index.html")
          if not path.exists():
              raise SystemExit("index.html was not found on the main branch.")

          html = path.read_text(encoding="utf-8")

          # Body version marker.
          html, body_count = re.subn(
              r'(<body\b[^>]*\bdata-current-version=["\'])[^"\']*(["\'])',
              rf'\g<1>{version}\g<2>',
              html,
              count=1,
              flags=re.IGNORECASE,
          )

          # All visible version labels.
          html, visible_count = re.subn(
              r'(<span\b[^>]*\bdata-software-version(?:=["\'][^"\']*["\'])?[^>]*>)'
              r'.*?'
              r'(</span>)',
              rf'\g<1>{version}\g<2>',
              html,
              flags=re.IGNORECASE | re.DOTALL,
          )

          # All marked download links.
          def update_download(match):
              before_href = match.group(1)
              quote = match.group(2)
              return f"{before_href}{quote}{download_url}{quote}"

          html, link_count = re.subn(
              r'(<a\b(?=[^>]*\bdata-download-link\b)[^>]*\bhref=)'
              r'(["\'])[^"\']*\2',
              update_download,
              html,
              flags=re.IGNORECASE,
          )

          # SoftwareApplication JSON-LD.
          json_pattern = re.compile(
              r'(<script\b[^>]*\bid=["\']softwareStructuredData["\'][^>]*>)'
              r'(.*?)'
              r'(</script>)',
              re.IGNORECASE | re.DOTALL,
          )
          block = json_pattern.search(html)

          if not block:
              raise SystemExit("softwareStructuredData JSON-LD block was not found.")

          data = json.loads(block.group(2).strip())
          data["softwareVersion"] = version
          data["downloadUrl"] = download_url
          data["installUrl"] = download_url
          data["releaseNotes"] = release_url

          replacement = (
              block.group(1)
              + "\n"
              + json.dumps(data, ensure_ascii=False, indent=2)
              + "\n  "
              + block.group(3)
          )

          html = html[:block.start()] + replacement + html[block.end():]

          if body_count != 1:
              raise SystemExit("data-current-version marker must exist exactly once.")
          if visible_count < 1:
              raise SystemExit("No data-software-version marker was found.")
          if link_count < 1:
              raise SystemExit("No data-download-link marker was found.")

          path.write_text(html, encoding="utf-8")

          print(f"Website version: {version}")
          print(f"Installer: {installer.get('name')}")
          print(f"Download URL: {download_url}")
          print(f"Updated visible labels: {visible_count}")
          print(f"Updated download links: {link_count}")
          PY

      - name: Commit website update
        run: |
          if git diff --quiet -- index.html; then
            echo "Website is already up to date."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add index.html
          git commit -m "Update website for ${{ github.event.release.tag_name || 'latest release' }}"
          git push origin main
